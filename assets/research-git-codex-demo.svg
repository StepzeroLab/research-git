<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 847 591" width="847" height="591" role="img" aria-labelledby="title desc">
  <title id="title">research-git capture and recall workflow in Codex</title>
  <desc id="desc">An animated Codex terminal captures an optional negative-total clamp as a Capsule, then reapplies it to a tax-aware calculator.</desc>
  <style>
    :root {
      --bg: #272822;
      --surface: #383830;
      --fg: #f8f8f2;
      --dim: #a59f85;
      --blue: #66d9ef;
      --cyan: #5fd7ff;
      --green: #a6e22e;
      --yellow: #f4bf75;
      --magenta: #d7afff;
      --duration: 30s;
    }
    text {
      font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      letter-spacing: 0;
      fill: var(--fg);
      dominant-baseline: text-before-edge;
      white-space: pre;
    }
    .dim { fill: var(--dim); }
    .blue { fill: var(--blue); }
    .cyan { fill: var(--cyan); }
    .green { fill: var(--green); }
    .yellow { fill: var(--yellow); }
    .magenta { fill: var(--magenta); }
    .bold { font-weight: 700; }
    .scene { opacity: 0; }
  </style>

  <rect width="847" height="591" rx="5" fill="var(--bg)"/>
  <circle cx="24" cy="23" r="7" fill="#f92672"/>
  <circle cx="44" cy="23" r="7" fill="#f4bf75"/>
  <circle cx="64" cy="23" r="7" fill="#a6e22e"/>
  <text x="423.5" y="15" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" opacity=".72">checkout-calculator — codex — 100×30</text>

  <g transform="translate(23 50)">
    <g class="scene startup">
      <animate attributeName="opacity" values="1;0;0" keyTimes="0;.04;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <text x="0" y="0" class="dim">╭──────────────────────────────────────────────────────────╮</text>
      <text x="0" y="17"><tspan class="dim">│ &gt;_ </tspan><tspan class="bold">OpenAI Codex</tspan><tspan class="dim"> (v0.144.4)</tspan></text>
      <text x="0" y="34" class="dim">│</text>
      <text x="0" y="51"><tspan class="dim">│ model:     </tspan><tspan>gpt-5.6-sol medium</tspan><tspan class="dim">   /model to change</tspan></text>
      <text x="0" y="68"><tspan class="dim">│ directory: </tspan><tspan>~/checkout-calculator</tspan></text>
      <text x="488" y="17" class="dim">│</text>
      <text x="488" y="34" class="dim">│</text>
      <text x="488" y="51" class="dim">│</text>
      <text x="488" y="68" class="dim">│</text>
      <text x="0" y="85" class="dim">╰──────────────────────────────────────────────────────────╯</text>
    </g>

    <g class="scene capture-run">
      <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.17;.26;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <g transform="translate(0 34)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Add an optional clamp for negative totals, test it, and capture the feature.</text>
      </g>
      <text x="0" y="102"><tspan class="blue">•</tspan> Edited 2 files (+15 −2)</text>
      <text x="0" y="119"><tspan class="blue">•</tspan> Ran pytest -q  <tspan class="dim">└</tspan> <tspan class="bold">4 passed</tspan></text>
      <text x="0" y="136"><tspan class="blue">•</tspan> Ran rgit capture  <tspan class="dim">└</tspan> <tspan class="magenta">prop_ab5097612d4d</tspan></text>
      <text x="0" y="153"><tspan class="blue">•</tspan> Proposed Capsule  <tspan class="dim">└</tspan> <tspan class="cyan">optional-negative-total-clamp</tspan></text>
      <text x="0" y="170"><tspan class="yellow">?</tspan> Keep this Capsule, or discard it?</text>
    </g>

    <g class="scene review">
      <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.26;.35;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <g transform="translate(0 0)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Add an optional clamp for negative totals, test it, and capture the feature.</text>
      </g>
      <text x="0" y="68"><tspan class="blue">•</tspan> Edited 2 files (+15 −2)</text>
      <text x="0" y="85"><tspan class="blue">•</tspan> Ran pytest -q  <tspan class="dim">└</tspan> <tspan class="bold">4 passed</tspan></text>
      <text x="0" y="102"><tspan class="blue">•</tspan> Ran rgit capture  <tspan class="dim">└</tspan> <tspan class="magenta">prop_ab5097612d4d</tspan></text>
      <text x="0" y="119"><tspan class="blue">•</tspan> Proposed Capsule  <tspan class="dim">└</tspan> <tspan class="cyan">optional-negative-total-clamp</tspan></text>
      <text x="0" y="136"><tspan class="yellow">?</tspan> Keep this Capsule, or discard it?</text>
    </g>

    <g class="scene recall-draft">
      <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.35;.46;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <g transform="translate(0 0)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Add an optional clamp for negative totals, test it, and capture the feature.</text>
      </g>
      <text x="0" y="68"><tspan class="blue">•</tspan> Ran pytest -q  <tspan class="dim">└</tspan> <tspan class="bold">4 passed</tspan></text>
      <text x="0" y="85"><tspan class="blue">•</tspan> Ran rgit capture  <tspan class="dim">└</tspan> <tspan class="magenta">prop_ab5097612d4d</tspan></text>
      <text x="0" y="102"><tspan class="blue">•</tspan> Proposed Capsule  <tspan class="dim">└</tspan> <tspan class="cyan">optional-negative-total-clamp</tspan></text>
      <text x="0" y="119"><tspan class="yellow">?</tspan> Keep this Capsule, or discard it?</text>
      <g transform="translate(0 136)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Keep it.</text>
      </g>
      <text x="0" y="204"><tspan class="blue">•</tspan> Approved <tspan class="cyan">optional-negative-total-clamp</tspan> → <tspan class="magenta">feat_41099a0ef8c4</tspan></text>
    </g>

    <g class="scene recall-run">
      <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.46;.50;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <g transform="translate(0 0)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Keep it.</text>
      </g>
      <text x="0" y="68"><tspan class="blue">•</tspan> Approved <tspan class="cyan">optional-negative-total-clamp</tspan> → <tspan class="magenta">feat_41099a0ef8c4</tspan></text>
      <g transform="translate(0 102)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Bring back the clamp on the current tax-aware calculator.</text>
      </g>
      <text x="0" y="170"><tspan class="blue">•</tspan> Recalled <tspan class="cyan">optional-negative-total-clamp</tspan>  <tspan class="dim">feat_41099a0ef8c4</tspan></text>
      <text x="0" y="187"><tspan class="blue">•</tspan> Applying Capsule to the current tax-aware implementation</text>
    </g>

    <g class="scene final">
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;.50;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
      <text x="0" y="0"><tspan class="blue">•</tspan> Ran rgit capture  <tspan class="dim">└</tspan> <tspan class="magenta">prop_ab5097612d4d</tspan></text>
      <text x="0" y="17"><tspan class="blue">•</tspan> Proposed Capsule  <tspan class="dim">└</tspan> <tspan class="cyan">optional-negative-total-clamp</tspan></text>
      <text x="0" y="34"><tspan class="yellow">?</tspan> Keep this Capsule, or discard it?</text>
      <g transform="translate(0 51)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Keep it.</text>
      </g>
      <text x="0" y="119"><tspan class="blue">•</tspan> Approved <tspan class="cyan">optional-negative-total-clamp</tspan> → <tspan class="magenta">feat_41099a0ef8c4</tspan></text>
      <g transform="translate(0 153)">
        <rect width="800" height="51" fill="var(--surface)"/>
        <text x="0" y="17"><tspan class="dim bold">› </tspan>Bring back the clamp on the current tax-aware calculator.</text>
      </g>
      <text x="0" y="221"><tspan class="blue">•</tspan> Recalled <tspan class="cyan">optional-negative-total-clamp</tspan>  <tspan class="dim">feat_41099a0ef8c4</tspan></text>
      <text x="0" y="238"><tspan class="blue">•</tspan> Applied Capsule to the current tax-aware implementation</text>
      <text x="16" y="255"><tspan class="dim">└</tspan> Preserved tax calculation and restored the optional clamp.</text>
      <text x="0" y="272"><tspan class="blue">•</tspan> Edited 2 files (+10 −2)</text>
      <text x="32" y="289" class="green">2 +    clamp_negative: bool = False</text>
      <text x="32" y="306" class="green">4 +    return max(0, total) if clamp_negative else total</text>
      <text x="0" y="323"><tspan class="blue">•</tspan> Ran pytest -q  <tspan class="dim">└</tspan> <tspan class="bold">6 passed</tspan></text>
      <text x="0" y="340"><tspan class="blue">•</tspan> Reapplied without rolling back the tax-aware refactor.</text>
      <text x="16" y="357"><tspan class="dim">└</tspan> Reviewable diff ready.</text>
    </g>

    <g transform="translate(0 425)">
      <rect width="800" height="51" fill="var(--surface)"/>
      <text x="0" y="17" class="bold">›</text>
      <text x="16" y="17" class="dim scene startup">Ask Codex to do anything<animate attributeName="opacity" values="1;0;0" keyTimes="0;.04;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/></text>
      <g class="scene capture-draft">
        <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.04;.17;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
        <clipPath id="capture-clip"><rect x="16" y="17" width="0" height="17"><animate attributeName="width" values="0;0;620;620" keyTimes="0;.04;.17;1" dur="30s" repeatCount="indefinite"/></rect></clipPath>
        <text x="16" y="17" clip-path="url(#capture-clip)">Add an optional clamp for negative totals, test it, and capture the feature.</text>
      </g>
      <text x="16" y="17" class="dim scene capture-run">Ask Codex to do anything<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.17;.26;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/></text>
      <text x="16" y="17" class="dim scene review">Ask Codex to do anything<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.26;.31;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/></text>
      <g class="scene keep-draft">
        <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.31;.35;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
        <clipPath id="keep-clip"><rect x="16" y="17" width="0" height="17"><animate attributeName="width" values="0;0;72;72" keyTimes="0;.31;.35;1" dur="30s" repeatCount="indefinite"/></rect></clipPath>
        <text x="16" y="17" clip-path="url(#keep-clip)">Keep it.</text>
      </g>
      <g class="scene recall-draft">
        <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.35;.46;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/>
        <clipPath id="recall-clip"><rect x="16" y="17" width="0" height="17"><animate attributeName="width" values="0;0;480;480" keyTimes="0;.35;.46;1" dur="30s" repeatCount="indefinite"/></rect></clipPath>
        <text x="16" y="17" clip-path="url(#recall-clip)">Bring back the clamp on the current tax-aware calculator.</text>
      </g>
      <text x="16" y="17" class="dim scene recall-run">Ask Codex to do anything<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;.46;.50;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/></text>
      <text x="16" y="17" class="dim scene final">Ask Codex to do anything<animate attributeName="opacity" values="0;1;1" keyTimes="0;.50;1" dur="30s" repeatCount="indefinite" calcMode="discrete"/></text>
    </g>

    <text x="16" y="493" class="dim">gpt-5.6-sol medium · ~/checkout-calculator · Main [default]</text>
  </g>
</svg>
