name: publish

# Push a version tag (e.g. `git tag v0.0.1 && git push origin v0.0.1`) and this
# builds the sdist+wheel and publishes them to PyPI via Trusted Publishing —
# no API token is stored anywhere. The tag must match the version in pyproject.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Tag must match pyproject version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg"
            exit 1
          fi
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is where the Trusted Publisher is authorized.
    environment:
      name: pypi
      url: https://pypi.org/p/research-git
    permissions:
      id-token: write          # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
